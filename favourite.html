<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Über mich</title>
</head>

<body id="top">
    <header>

        <!--Balken hinter dem Menü-->

        <p class="blackbalk"
            style="background-image: linear-gradient(to bottom, rgb(133, 154, 149), rgb(181, 209, 202), white);"></p>

        <!--Titel-->

        <div>
            <a href="index.html" class="titleLink">Über mich!</a>
        </div>

        <!--Menüleiste-->

        <nav>
            <ul class="menu">
                <li>
                    <a href="index.html" class="a">Home</a>
                </li>
                <li>
                    <a href="about.html" class="a">About me</a>
                </li>
                <li>
                    <a href="sc.html" class="a">Social Media</a>
                </li>
                <li>
                    <a href="pictures.html" class="a">Bilder</a>
                </li>
                <li>
                    <a href="favourite.html" class="a" style="color: white; font-weight: 600">Favoriten</a>
                </li>
                <li>
                    <a href="contact.html" class="a">Kontakt</a>
                </li>
            </ul>
        </nav>

        <!--Bildseitentext-->

        <div id="imageList" class="siteText" style="margin-top: 135px; margin-left: -200px">
            <p style="font-size: 40px; color: rgb(150, 173, 168)">Hier werden dir deine favorisierten Bilder angezeigt
            </p>
        </div>


        <input type="button" value="Favoriten löschen" class="deleteButton" style=" margin: 20px; cursor: pointer"
            onclick="localStorage.clear(); location.reload();">


    </header>

    <main>

        <div id="myFavorites" style="display: flex; flex-wrap: wrap; gap: 15px;"></div>

    </main>

    <footer>

        <div class="footerTitle">
            <a href="index.html" style="margin-top: 95px">Über mich</a>
        </div>

        <a href="#top" class="scrollToTop">Zurück zum Seitenanfang</a>

        <div class="footerText">
            <li>
                <a href="about.html">About me</a>
            </li>
            <li>
                <a href="pictures.html">Bilder</a>
            </li>
            <li>
                <a href="contact.html">Kontakt</a>
            </li>
        </div>

        <div class="blackbalk2"></div>

    </footer>

    <script>

        document.addEventListener("DOMContentLoaded", () => {
            let favoritesContainer = document.getElementById("myFavorites");
            let allURLs = Object.values(localStorage);

            if (allURLs.length === 0) {
                let deleteButton = document.querySelector(".deleteButton");
                deleteButton.style.display = "none";
                return;
            }

            allURLs.forEach(url => {
                let img = document.createElement("img");
                img.src = url;
                favoritesContainer.appendChild(img);

                img.style.width = "auto";
                img.style.height = "300px";
                img.style.borderRadius = "25px";
                img.style.margin = "12px";
                img.style.marginLeft = "60px"

            });
        });

    </script>

</body>

</html>
